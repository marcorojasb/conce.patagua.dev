<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Conce Transporte favicon — same Lucide "bus" glyph used as the header
    brand mark. Background flips on prefers-color-scheme so the icon stays
    legible on both light and dark browser chrome.
  -->
  <style>
    .bg { fill: #18181b }
    .fg { stroke: #ffffff }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #fafafa }
      .fg { stroke: #18181b }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="7" />
  <g
    class="fg"
    transform="translate(4 4)"
    fill="none"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M8 6v6" />
    <path d="M15 6v6" />
    <path d="M2 12h19.6" />
    <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3" />
    <circle cx="7" cy="18" r="2" />
    <path d="M9 18h5" />
    <circle cx="16" cy="18" r="2" />
  </g>
</svg>
